<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Lane</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loading-screen">

    <div class="stars"></div>

    <div class="moon"></div>

    <div class="comet"></div>

    <div class="overlay">

        <h1>Memory Lane</h1>

        <p>Every date has a story.</p>

        <button id="enterBtn">
            Touch Anywhere To Begin
        </button>

    </div>

</div>


<div id="home" class="hidden">

    <h2>Memory Lane</h2>

    <div class="menu">

        <div class="card" id="calendarCard">
            <img src="icons/calendar.png">
            <p>Calendar</p>
        </div>

        <div class="card" id="videoCard">
            <img src="icons/video.png">
            <p>Videos</p>
        </div>

        <div class="card" id="puzzleCard">
            <img src="icons/puzzle.png">
            <p>Puzzle</p>
        </div>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
